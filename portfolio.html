<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio | Fleurbakker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', sans-serif;
      color: white;
      overflow-x: hidden;
      /* full-page gradient: black top → deep blue bottom */
      background: linear-gradient(to bottom, #000000 0%, #040a1e 40%, #0b1f5c 100%);
      background-attachment: fixed;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      position: fixed;
      width: 100%;
      z-index: 1000;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .nav-logo {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; }
    .nav-links a {
      color: white;
      margin-left: 25px;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      font-weight: 300;
      transition: opacity 0.3s;
    }
    .nav-links a:hover { opacity: 0.7; }
    .nav-links a.active {
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding-bottom: 2px;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 540px;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 60%, rgba(0,0,0,0.5) 100%);
    }

    /* ── PAGE TITLE ── */
    .page-title {
      text-align: center;
      padding: 60px 40px 20px;
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      font-weight: 500;
      letter-spacing: 2px;
      color: rgb(240, 255, 31);
    }

    /* ── SLIDESHOWS ── */
    .slideshows {
      padding: 40px 60px 80px;
      display: flex;
      flex-direction: column;
      gap: 72px;
    }

    .slideshow-meta {
      margin-bottom: 20px;
    }
    .slideshow-meta h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .slideshow-meta p {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 1.5px;
      opacity: 0.55;
      text-transform: uppercase;
    }

    /* ── SLIDER ── */
    .slider-outer {
      position: relative;
    }
    .slider-track-wrap {
      overflow: hidden;
    }
    .slider-track {
      display: flex;
      gap: 8px;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Each image card — width set by JS, 2:3 ratio */
    .img-wrap {
      flex-shrink: 0;
      aspect-ratio: 2 / 3;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      /* width is set inline by JS */
    }
    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      transition: opacity 0.4s ease;
    }
    .img-wrap:hover::after {
      opacity: 0;
    }

    /* ── ARROWS ── */
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: rgb(240, 255, 31);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      font-size: 28px;
      line-height: 1;
      transition: opacity 0.2s;
      user-select: none;
      padding: 0;
    }
    .slider-btn:hover { opacity: 0.65; }

    /* ── FADE IN ── */
    .fade {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .fade.show { opacity: 1; transform: translateY(0); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 30px;
      font-size: 13px;
      opacity: 0.3;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      nav { flex-direction: column; gap: 10px; align-items: center; }
      .nav-links { flex-wrap: wrap; justify-content: center; }
      .nav-links a { margin: 4px 10px; }
      .hero { height: 280px; }
      .page-title { font-size: 32px; padding-top: 40px; }
      .slideshows { padding: 30px 16px 60px; gap: 50px; }
    }
    /* ── COPY PROTECTION ── */
    img { -webkit-user-drag: none; user-drag: none; pointer-events: none; }
    .img-wrap { -webkit-user-select: none; user-select: none; }
    body { -webkit-user-select: none; user-select: none; }

  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">FBF</a>
    <div class="nav-links">

            <div class="img-wrap"><img src="https://static.wixstatic.com/media/be7317_f648666b71c74b8f8b50526c1816119c~mv2.jpg/v1/fill/w_600,h_860,fp_0.53_0.21,q_90,enc_avif,quality_auto/be7317_f648666b71c74b8f8b50526c1816119c~mv2.jpg" alt="Aurelio 2" /></div>
            <div class="img-wrap"><img src="https://static.wixstatic.com/media/be7317_0c9c421a106f440caf1c5af78533ed5b~mv2.jpg/v1/fill/w_600,h_860,fp_0.53_0.24,q_90,enc_avif,quality_auto/be7317_0c9c421a106f440caf1c5af78533ed5b~mv2.jpg" alt="Aurelio 3" /></div>
            <div class="img-wrap"><img src="https://static.wixstatic.com/media/be7317_a6ed475f8f5c48b8ae5fefeb7103246a~mv2.jpg/v1/fill/w_600,h_860,fp_0.59_0.35,q_90,enc_avif,quality_auto/be7317_a6ed475f8f5c48b8ae5fefeb7103246a~mv2.jpg" alt="Aurelio 4" /></div>

            <div class="img-wrap"><img src="https://static.wixstatic.com/media/be7317_28f57b075f054153b4b9082226315b81~mv2.jpg/v1/fill/w_600,h_860,fp_0.51_0.29,q_90,enc_avif,quality_auto/be7317_28f57b075f054153b4b9082226315b81~mv2.jpg" alt="Julia 1" /></div>

  <script>
    const state = {};
    const GAP = 8;
    const VISIBLE = 3.5;

    function initSliders() {
      ['track-1', 'track-2', 'track-3'].forEach(id => {
        const track = document.getElementById(id);
        const trackWrap = track.parentElement; // .slider-track-wrap
        const containerW = trackWrap.offsetWidth;
        // Calculate image width so exactly 3.5 fit in the container
        const imgW = (containerW - GAP * Math.floor(VISIBLE)) / VISIBLE;

        // Apply width to every img-wrap in this track
        track.querySelectorAll('.img-wrap').forEach(el => {
          el.style.width = imgW + 'px';
        });

        // Position arrows
        const outer = track.closest('.slider-outer');
        const prevBtn = outer.querySelector('.slider-btn.prev');
        const nextBtn = outer.querySelector('.slider-btn.next');
        // prev: at left edge of first image
        prevBtn.style.left = '0px';
        prevBtn.style.right = 'auto';
        // next: at right edge of 3rd image (start of the half-visible 4th)
        nextBtn.style.left = ((imgW + GAP) * 3 - GAP / 2) + 'px';
        nextBtn.style.right = 'auto';

        // Re-apply current scroll position
        if (state[id] !== undefined) {
          track.style.transform = `translateX(-${state[id] * (imgW + GAP)}px)`;
        }
      });
    }

    function goTo(trackId, idx) {
      const track = document.getElementById(trackId);
      const total = track.querySelectorAll('.img-wrap').length;
      const maxIdx = Math.max(0, total - Math.ceil(VISIBLE));
      idx = Math.max(0, Math.min(idx, maxIdx));
      state[trackId] = idx;

      const imgW = track.querySelector('.img-wrap').offsetWidth;
      track.style.transform = `translateX(-${idx * (imgW + GAP)}px)`;
    }

    function slide(trackId, dir) {
      const current = state[trackId] || 0;
      goTo(trackId, current + dir);
    }

    // Init on load and resize
    window.addEventListener('load', initSliders);
    window.addEventListener('resize', initSliders);

    // Fade in on scroll
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('show'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade').forEach(el => obs.observe(el));
  </script>
  <script>
    // Disable right-click
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Disable common copy/save shortcuts
    document.addEventListener('keydown', e => {
      const blocked = (
        (e.ctrlKey || e.metaKey) && ['s', 'u', 'p', 'a', 'c'].includes(e.key.toLowerCase())
      ) || e.key === 'F12';
      if (blocked) e.preventDefault();
    });

    // Disable drag of images
    document.addEventListener('dragstart', e => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
  </script>

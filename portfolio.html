<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio | Fleurbakker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', sans-serif;
      color: white;
      overflow-x: hidden;
      background: linear-gradient(to bottom, #000000 0%, #040a1e 45%, #0b1f5c 100%);
    }

    /* ── NAV — transparant, geel hover ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 35px 80px;
      position: fixed;
      width: 100%;
      z-index: 1000;
      box-sizing: border-box;
      background: transparent;
    }
    .nav-logo {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      color: white;
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-logo:hover { color: #f0ff1f; }
    .nav-links { display: flex; align-items: center; }
    .nav-links a {
      color: white;
      margin-left: 25px;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 300;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: #f0ff1f; }
    .nav-links a.active {
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding-bottom: 2px;
    }

    /* ── HERO MET PORTFOLIO TITEL ERIN ── */
    .hero {
      position: relative;
      width: 100%;
      height: 540px;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0.55) 100%);
    }
    /* Titel bovenop de hero afbeelding */
    .hero-title {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 500;
      letter-spacing: 3px;
      color: #f0ff1f;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    /* ── SLIDESHOWS ── */
    .slideshows {
      padding: 60px 60px 80px;
      display: flex;
      flex-direction: column;
      gap: 72px;
    }

    .slideshow-meta {
      margin-bottom: 20px;
    }
    .slideshow-meta h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .slideshow-meta p {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 1.5px;
      opacity: 0.55;
      text-transform: uppercase;
    }

    /* ── SLIDER ── */
    .slider-outer {
      position: relative;
      /* ruimte links en rechts voor de pijlknoppen */
      padding: 0 44px;
    }
    .slider-track-wrap {
      overflow: hidden;
    }
    .slider-track {
      display: flex;
      gap: 8px;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Elke afbeeldingskaart — breedte via JS, 2:3 ratio */
    .img-wrap {
      flex-shrink: 0;
      aspect-ratio: 2 / 3;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      transition: opacity 0.4s ease;
    }
    .img-wrap:hover::after { opacity: 0; }

    /* ── PIJLEN — links en rechts van de slider ── */
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #f0ff1f;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      font-size: 28px;
      line-height: 1;
      transition: opacity 0.2s;
      user-select: none;
      padding: 0;
    }
    .slider-btn:hover { opacity: 0.65; }
    .slider-btn.prev { left: 0; }
    .slider-btn.next { right: 0; }

    /* ── FADE IN ── */
    .fade {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .fade.show { opacity: 1; transform: translateY(0); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 30px;
      font-size: 13px;
      opacity: 0.3;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      nav { padding: 20px; }
      .nav-links a { margin: 4px 10px; }
      .hero { height: 280px; }
      .hero-title { font-size: 36px; bottom: 24px; }
      .slideshows { padding: 30px 16px 60px; gap: 50px; }
      .slider-outer { padding: 0 32px; }
    }

    /* ── COPY PROTECTION ── */
    img { -webkit-user-drag: none; pointer-events: none; }
    .img-wrap { -webkit-user-select: none; user-select: none; }
    body { -webkit-user-select: none; user-select: none; }
  </style>
</head>

  <script>
    const TRACK_IDS = ['track-1', 'track-2', 'track-3'];
    const GAP     = 8;
    const VISIBLE = 3; // toon 3 volledige afbeeldingen tegelijk

    // state: huidige index per track
    const state = {};
    TRACK_IDS.forEach(id => state[id] = 0);

    function initSliders() {
      TRACK_IDS.forEach(id => {
        const track     = document.getElementById(id);
        const trackWrap = track.parentElement;
        const containerW = trackWrap.offsetWidth;

        // Breedte zodat precies VISIBLE afbeeldingen volledig passen
        const imgW = (containerW - GAP * (VISIBLE - 1)) / VISIBLE;

        track.querySelectorAll('.img-wrap').forEach(el => {
          el.style.width = imgW + 'px';
        });

        // Herpositioneer naar huidige index na resize
        applyTransform(id, imgW);
      });
    }

    function getImgW(trackId) {
      return document.querySelector(`#${trackId} .img-wrap`).offsetWidth;
    }

    function applyTransform(trackId, imgW) {
      const track = document.getElementById(trackId);
      const idx   = state[trackId] || 0;
      track.style.transform = `translateX(-${idx * (imgW + GAP)}px)`;
    }

    function goTo(trackId, idx) {
      const track  = document.getElementById(trackId);
      const total  = track.querySelectorAll('.img-wrap').length;
      const maxIdx = total - VISIBLE;       // maximale index zodat laatste afbeelding volledig zichtbaar is
      idx = Math.max(0, Math.min(idx, maxIdx));
      state[trackId] = idx;
      applyTransform(trackId, getImgW(trackId));
    }

    function slide(trackId, dir) {
      goTo(trackId, (state[trackId] || 0) + dir);
    }

    window.addEventListener('load',   initSliders);
    window.addEventListener('resize', initSliders);

    // Fade in bij scrollen
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('show'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade').forEach(el => obs.observe(el));
  </script>

  <script>
    // Kopieerbeveiliging
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      const blocked = (
        (e.ctrlKey || e.metaKey) && ['s','u','p','a','c'].includes(e.key.toLowerCase())
      ) || e.key === 'F12';
      if (blocked) e.preventDefault();
    });
    document.addEventListener('dragstart', e => {
      if (e.target.tagName === 'IMG') e.preventDefault();
    });
  </script>

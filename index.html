<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Fleur Bakker Fotografie</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
 margin:0;
 font-family:'Inter', sans-serif;
 background:black;
 color:white;
 overflow-x:hidden;
}

/* NAVBAR GLASS */
nav {
 display:flex;
 justify-content:space-between;
 padding:20px 50px;
 position:fixed;
 width:100%;
 z-index:1000;
 background:rgba(0,0,0,0.3);
 backdrop-filter: blur(12px);
 transition:0.3s;
}

nav.scrolled {
 background:rgba(0,0,0,0.8);
}

nav a {
 color:white;
 margin-left:30px;
 text-decoration:none;
 font-size:13px;
 letter-spacing:2px;
 text-transform:uppercase;
}

nav a:hover {
 opacity:0.6;
}

/* HERO FULLSCREEN */
.hero {
 position:relative;
 height:100vh;
 overflow:hidden;
}

.hero img {
 width:100%;
 height:100%;
 object-fit:cover;
 filter:brightness(0.7);
.hero-text {
 position:absolute;
 top:40%;
 left:80%;
 transform:translate(-50%, -50%);
 text-align:center;
 width:100%;
}

.hero-text h1 {
 font-family:'Playfair Display', serif;
 font-size:60px;
 margin:0;
}

.hero-text p {
 font-size:18px;
 opacity:0.8;
}

/* OVERLAP SECTION (WIX STYLE) */
.over {
 margin-top:-100px;
 background:rgba(11, 31, 92, 0.6);
 padding:100px 80px;
 backdrop-filter: blur(10px);
}

.over h2 {
 font-family:'Playfair Display', serif;
 font-size:40px;
 margin-bottom:20px;
}

.over p {
 line-height:1.9;
 max-width:800px;
}

/* FADE IN */
.fade {
 opacity:0;
 transform:translateY(60px);
 transition:1.2s ease;
}

.fade.show {
 opacity:1;
 transform:translateY(0);
}

/* IMAGE HOVER ZOOM */
.zoom {
 overflow:hidden;
}

.zoom img {
 transition: transform 0.8s ease;
}

.zoom:hover img {
 transform:scale(1.05);
}

/* MOBILE */
@media (max-width:900px){

.hero-text {
 left:30px;
 bottom:40px;
}

.hero-text h1 {
 font-size:32px;
}

.over {
 padding:60px 30px;
 margin-top:-50px;
}

nav {
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:20px 50px;
 position:fixed;
 width:100%;
 box-sizing:border-box; 
 z-index:1000;
 background:rgba(0,0,0,0.3);
 backdrop-filter: blur(12px);
}
}

}

</style>
</head>

<body>

<nav id="nav">
<div>FBF</div>
<div>
<a href="index.html">Home</a>
<a href="portfolio.html">Portfolio</a>
<a href="over.html">Over mij</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<section class="hero zoom fade">
<img src="hero.jpg">
<div class="hero-text">
<h1>Fleur Bakker</h1>
<p>Fotografie met oog voor licht en gevoel</p>
</div>
</section>

<section class="over fade">
<h2>Over</h2>

<p>
Oog voor detail is iets wat mij vaak wordt teruggegeven wanneer ik mijn werk laat zien...
</p>

</section>

<script>

/* NAV SCROLL EFFECT */
window.addEventListener("scroll", function() {
 document.getElementById("nav").classList.toggle("scrolled", window.scrollY > 50);
});

/* FADE IN */
const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
 entries.forEach(entry => {
  if(entry.isIntersecting){
   entry.target.classList.add('show');
  }
 });
});

faders.forEach(el => observer.observe(el));

</script>

</body>
</html>

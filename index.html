<style>

/* Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap');

body {
 margin:0;
 font-family:'Inter', sans-serif;
 background:black;
 color:white;
 overflow-x:hidden;
}

/* NAV */
nav {
 display:flex;
 justify-content:space-between;
 padding:20px 40px;
 position:fixed;
 width:100%;
 z-index:1000;
 background:rgba(0,0,0,0.4);
 backdrop-filter: blur(10px);
 border-bottom:1px solid rgba(255,255,255,0.1);
}

nav a {
 color:white;
 margin-left:25px;
 text-decoration:none;
 font-size:14px;
 letter-spacing:1px;
}

nav a:hover {
 opacity:0.7;
}

/* HERO */
.hero {
 display:flex;
 min-height:80vh;
}

.hero img {
 width:50%;
 object-fit:cover;
}

.hero-text {
 width:50%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 padding:80px;
}

.hero-text h1 {
 font-family:'Playfair Display', serif;
 font-size:48px;
 font-weight:500;
 margin-bottom:20px;
}

.hero-text p {
 font-size:16px;
 opacity:0.8;
}

/* OVER */
.over {
 background:#0b1f5c;
 padding:100px 80px;
}

.over h2 {
 font-family:'Playfair Display', serif;
 font-size:36px;
 margin-bottom:20px;
}

.over h4 {
 font-weight:300;
 margin-bottom:10px;
}

.over p {
 line-height:1.8;
 max-width:800px;
}

/* FADE IN */
.fade {
 opacity:0;
 transform: translateY(40px);
 transition: all 1s ease;
}

.fade.show {
 opacity:1;
 transform: translateY(0);
}

/* MOBIEL */
@media (max-width: 900px) {

.hero {
 flex-direction:column;
}

.hero img {
 width:100%;
 height:50vh;
}

.hero-text {
 width:100%;
 padding:40px;
}

.hero-text h1 {
 font-size:32px;
}

.over {
 padding:60px 30px;
}

nav {
 flex-direction:column;
 align-items:center;
}

}

</style>
